<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dekripsi</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#1173d4",
        "background-light": "#f6f7f8",
        "background-dark": "#101922",
      },
      fontFamily: {
        display: ["Inter", "sans-serif"]
      },
    },
  },
}
</script>

<style>

.material-symbols-outlined {
  font-variation-settings:
    'FILL' 0,
    'wght' 400,
    'GRAD' 0,
    'opsz' 24
}

body {
  min-height: max(884px, 100dvh);
}

</style>
</head>

<body class="font-display">

<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark">

<!-- HEADER -->

<header class="flex items-center p-4 pb-2 justify-between sticky top-0 z-10 bg-background-light dark:bg-background-dark/80 backdrop-blur-sm">

  <div class="flex size-12 shrink-0 items-center justify-start">

    <button
      onclick="window.location.href='menu.html'"
      class="flex size-12 cursor-pointer items-center justify-center rounded-full text-gray-900 dark:text-white hover:bg-gray-500/10 transition-colors">

      <span class="material-symbols-outlined">
        arrow_back
      </span>

    </button>

  </div>

  <h1 class="text-gray-900 dark:text-white text-lg font-bold flex-1 text-center">
    Dekripsi
  </h1>

  <div class="flex size-12 shrink-0 items-center justify-end"></div>

</header>

<!-- MAIN -->

<main class="flex flex-col gap-6 p-4 flex-1">

  <!-- CIPHERTEXT -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Ciphertext
    </label>

    <textarea
      id="ciphertext"
      placeholder="Masukkan ciphertext..."
      class="form-input w-full resize-none rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 min-h-40 p-4 text-base"></textarea>

  </div>

  <!-- PRIVATE KEY -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Kunci Pribadi (n, d)
    </label>

    <input
      id="private-key"
      placeholder="Contoh: (5431, 7429)"
      class="form-input w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 px-4 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50"/>

  </div>

  <!-- DECRYPT BUTTON -->

  <div class="py-2">

    <button
      id="decrypt-btn"
      class="flex w-full items-center justify-center gap-2 rounded-xl h-14 px-5 bg-green-600 text-white font-bold hover:bg-green-700 transition-colors">

      <span class="material-symbols-outlined">
        lock_open
      </span>

      <span>
        Dekripsi
      </span>

    </button>

  </div>

  <!-- PLAINTEXT -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Plaintext
    </label>

    <textarea
      id="plaintext"
      readonly
      placeholder="Hasil dekripsi..."
      class="form-input w-full resize-none rounded-xl text-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-900/50 min-h-40 p-4 text-base"></textarea>

  </div>

</main>
</div>

<script>

// --------------------------------------------------
// GCD
// --------------------------------------------------

function gcd(a, b) {

  return b === 0
    ? a
    : gcd(b, a % b);

}

// --------------------------------------------------
// MODULAR POWER
// --------------------------------------------------

function modPow(base, exp, mod) {

  let result = 1n;

  let b = BigInt(base);

  let e = BigInt(exp);

  let m = BigInt(mod);

  while (e > 0n) {

    if (e % 2n === 1n) {

      result =
        (result * b) % m;

    }

    b =
      (b * b) % m;

    e /= 2n;

  }

  return Number(result);

}

// --------------------------------------------------
// MODULAR INVERSE
// --------------------------------------------------

function modInverse(a, m) {

  a =
    ((a % m) + m) % m;

  for (let x = 1; x < m; x++) {

    if ((a * x) % m === 1) {

      return x;

    }

  }

  return 1;

}

// --------------------------------------------------
// HEX TANPA SPASI
// --------------------------------------------------

function fromHexString(hexStr) {

  const cleanHex =
    hexStr.replace(/\s+/g, "");

  const result = [];

  for (let i = 0; i < cleanHex.length; i += 2) {

    result.push(
      parseInt(
        cleanHex.substring(i, i + 2),
        16
      )
    );

  }

  return result;

}

// --------------------------------------------------
// DEKRIPSI
// --------------------------------------------------

document
.getElementById("decrypt-btn")
.addEventListener("click", () => {

  const cipherHex =
    document
      .getElementById("ciphertext")
      .value
      .trim();

  const keyInput =
    document
      .getElementById("private-key")
      .value
      .trim();

  const output =
    document
      .getElementById("plaintext");

  // VALIDASI

  if (!cipherHex || !keyInput) {

    output.value =
      "Mohon isi ciphertext dan private key.";

    return;

  }

  // --------------------------------------------------
  // PARSING PRIVATE KEY
  // --------------------------------------------------

  const match =
    keyInput.match(/\((\d+),\s*(\d+)\)/);

  if (!match) {

    output.value =
      "Format private key salah.";

    return;

  }

  const n =
    parseInt(match[1]);

  const d =
    parseInt(match[2]);

  // --------------------------------------------------
  // HEX -> INTEGER
  // --------------------------------------------------

  const C_perm =
    fromHexString(cipherHex);

  const length =
    C_perm.length;

  if (length === 0) {

    output.value =
      "Ciphertext kosong.";

    return;

  }

  if (length % 2 !== 0) {

    output.value =
      "Ciphertext tidak valid.";

    return;

  }

  // --------------------------------------------------
  // INVERSE PERMUTATION
  // --------------------------------------------------

  let a = 5;

  while (
    gcd(a, length) !== 1
  ) {

    a++;

  }

  const a_inv =
    modInverse(a, length);

  const C =
    new Array(length);

  for (let j = 0; j < length; j++) {

    const i =
      (a_inv * j) % length;

    C[i] =
      C_perm[j];

  }

  // --------------------------------------------------
  // PISAHKAN Cu DAN Cr
  // --------------------------------------------------

  const Cu = [];
  const Cr = [];

  for (let i = 0; i < C.length; i += 2) {

    Cu.push(C[i]);
    Cr.push(C[i + 1]);

  }

  // --------------------------------------------------
  // RSA DECRYPTION
  // --------------------------------------------------

  const u_list =
    Cu.map(
      cu => modPow(cu, d, n)
    );

  const r_list =
    Cr.map(
      cr => modPow(cr, d, n)
    );

  // --------------------------------------------------
  // REKONSTRUKSI
  // --------------------------------------------------

  const bytes = [];

  for (let i = 0; i < u_list.length; i++) {

    const m =
      (u_list[i] + r_list[i]) % 256;

    bytes.push(m);

  }

  // --------------------------------------------------
  // UTF-8 DECODE
  // --------------------------------------------------

  const decoder =
    new TextDecoder();

  const plaintext =
    decoder.decode(
      new Uint8Array(bytes)
    );

  output.value =
    plaintext;

});

</script>

</body>
</html>

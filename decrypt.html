<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dekripsi</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#1173d4",
        "background-light": "#f6f7f8",
        "background-dark": "#101922",
      },
      fontFamily: {
        display: ["Inter", "sans-serif"]
      },
    },
  },
}
</script>

<style>

.material-symbols-outlined {
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24
}

body {
  min-height: max(884px, 100dvh);
}

</style>
</head>

<body class="font-display">

<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark">

<header class="flex items-center p-4 pb-2 justify-between sticky top-0 z-10 bg-background-light dark:bg-background-dark/80 backdrop-blur-sm">

  <div class="flex size-12 shrink-0 items-center justify-start">

    <button
      onclick="window.location.href='menu.html'"
      class="flex size-12 cursor-pointer items-center justify-center rounded-full text-gray-900 dark:text-white hover:bg-gray-500/10 transition-colors">

      <span class="material-symbols-outlined">
        arrow_back
      </span>

    </button>

  </div>

  <h1 class="text-gray-900 dark:text-white text-lg font-bold flex-1 text-center">
    Dekripsi
  </h1>

  <div class="flex size-12 shrink-0 items-center justify-end"></div>

</header>

<main class="flex flex-col gap-6 p-4 flex-1">

  <!-- CIPHERTEXT -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Ciphertext
    </label>

    <textarea
      id="ciphertext"
      placeholder="Masukkan ciphertext..."
      class="form-input w-full resize-none rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 min-h-40 p-4 text-base"></textarea>

  </div>

  <!-- PRIVATE KEY -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Kunci Pribadi (n, d)
    </label>

    <input
      id="private-key"
      placeholder="Contoh: (3233, 2753)"
      class="form-input w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 px-4 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50"/>

  </div>

  <!-- DECRYPT BUTTON -->

  <div class="py-2">

    <button
      id="decrypt-btn"
      class="flex w-full items-center justify-center gap-2 rounded-xl h-14 px-5 bg-green-600 text-white font-bold hover:bg-green-700 transition-colors">

      <span class="material-symbols-outlined">
        lock_open
      </span>

      <span>
        Dekripsi
      </span>

    </button>

  </div>

  <!-- PLAINTEXT -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Plaintext
    </label>

    <textarea
      id="plaintext"
      readonly
      placeholder="Hasil dekripsi..."
      class="form-input w-full resize-none rounded-xl text-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-900/50 min-h-40 p-4 text-base"></textarea>

  </div>

</main>
</div>

<script>

// --------------------------------------------------
// FUNGSI BANTU
// --------------------------------------------------

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function modPow(base, exp, mod) {

  let result = 1n;

  let b = BigInt(base);
  let e = BigInt(exp);
  let m = BigInt(mod);

  while (e > 0n) {

    if (e % 2n === 1n) {
      result = (result * b) % m;
    }

    b = (b * b) % m;
    e /= 2n;
  }

  return Number(result);
}

function fromHexString(hexStr) {

  return hexStr
    .trim()
    .split(/\s+/)
    .map(x => parseInt(x, 16));

}

// --------------------------------------------------
// DEKRIPSI
// --------------------------------------------------

document.getElementById("decrypt-btn").addEventListener("click", () => {

  const cipherHex =
    document.getElementById("ciphertext").value.trim();

  const keyInput =
    document.getElementById("private-key").value.trim();

  const output =
    document.getElementById("plaintext");

  if (!cipherHex || !keyInput) {

    output.value =
      "Mohon isi ciphertext dan private key.";

    return;
  }

  const match =
    keyInput.match(/\((\d+),\s*(\d+)\)/);

  if (!match) {

    output.value =
      "Format private key salah.";

    return;
  }

  const n =
    parseInt(match[1]);

  const d =
    parseInt(match[2]);

  // Hex -> Integer

  const C_perm =
    fromHexString(cipherHex);

  const length =
    C_perm.length;

  // Inverse permutation

  let a = 5;

  if (gcd(a, length) !== 1) {
    a = 3;
  }

  const perm =
    Array.from({length}, (_, i) => (a * i) % length);

  const inverse_perm =
    Array(length).fill(0);

  for (let i = 0; i < length; i++) {

    inverse_perm[perm[i]] = i;

  }

  const C =
    inverse_perm.map(i => C_perm[i]);

  // Pisahkan Cu dan Cr

  const Cu =
    C.filter((_, i) => i % 2 === 0);

  const Cr =
    C.filter((_, i) => i % 2 === 1);

  // RSA decryption

  const Du =
    Cu.map(cu => modPow(cu, d, n));

  const Dr =
    Cr.map(cr => modPow(cr, d, n));

  // Rekonstruksi plaintext

  const M =
    Du.map((du, i) => (du + Dr[i]) % 256);

  const plaintext =
    M.map(m => String.fromCharCode(m)).join("");

  output.value = plaintext;

});

</script>
</body>
</html>

<script>

// ------------------------------------
// FUNGSI BANTU
// ------------------------------------

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function modPow(base, exp, mod) {

  let result = 1n;

  let b = BigInt(base);
  let e = BigInt(exp);
  let m = BigInt(mod);

  while (e > 0n) {

    if (e % 2n === 1n) {
      result = (result * b) % m;
    }

    b = (b * b) % m;
    e /= 2n;
  }

  return Number(result);
}

function fromHexString(hexStr) {

  const res = [];

  for (let i = 0; i < hexStr.length; i += 2) {

    res.push(
      parseInt(hexStr.slice(i, i + 2), 16)
    );
  }

  return res;
}

// ------------------------------------
// PROSES DEKRIPSI
// ------------------------------------

document.getElementById("decrypt-btn").addEventListener("click", () => {

  const cipherHex =
    document.getElementById("encrypted-text").value.trim();

  const keyInput =
    document.getElementById("private-key").value.trim();

  const output =
    document.getElementById("original-text");

  if (!cipherHex || !keyInput) {

    output.value =
      "Mohon isi ciphertext dan kunci pribadi.";

    return;
  }

  const match =
    keyInput.match(/\((\d+),\s*(\d+)\)/);

  if (!match) {

    output.value =
      "Format kunci pribadi salah. Gunakan (n, d)";

    return;
  }

  const n = parseInt(match[1]);
  const d = parseInt(match[2]);

  const C_perm =
    fromHexString(cipherHex);

  const length =
    C_perm.length;

  if (length % 2 !== 0) {

    output.value =
      "Ciphertext tidak valid: jumlah byte ganjil.";

    return;
  }

  // ------------------------------------
  // Balikkan permutasi
  // ------------------------------------

  let a = 5;

  if (gcd(a, length) !== 1) {
    a = 3;
  }

  // PERBAIKAN
  const perm =
    Array.from({length}, (_, i) => (a * i) % length);

  const inverse_perm =
    Array(length).fill(0);

  for (let i = 0; i < length; i++) {
    inverse_perm[perm[i]] = i;
  }

  const C =
    inverse_perm.map(i => C_perm[i]);

  // ------------------------------------
  // Pisahkan Cu dan Cr
  // ------------------------------------

  const Cu =
    C.filter((_, i) => i % 2 === 0);

  const Cr =
    C.filter((_, i) => i % 2 === 1);

  // ------------------------------------
  // Dekripsi di Z_256
  // ------------------------------------

  const Du =
    Cu.map(cu => modPow(cu, d, 256));

  const Dr =
    Cr.map(cr => modPow(cr, d, 256));

  // ------------------------------------
  // Rekonstruksi plaintext
  // ------------------------------------

  const M =
    Du.map((du, i) => (du + Dr[i]) % 256);

  const plaintext =
    M.map(m => String.fromCharCode(m)).join('');

  output.value =
    plaintext || "(Dekripsi gagal atau hasil kosong)";

});

// Tombol salin

document.getElementById("copy-btn").addEventListener("click", () => {

  const out =
    document.getElementById("original-text");

  navigator.clipboard.writeText(out.value);

});

</script>

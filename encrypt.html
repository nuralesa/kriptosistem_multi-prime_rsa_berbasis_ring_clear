<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kriptosistem - Enkripsi & Dekripsi</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#1173d4",
        "background-light": "#f6f7f8",
        "background-dark": "#101922",
      },
      fontFamily: {
        display: ["Inter", "sans-serif"]
      },
    },
  },
}
</script>

<style>

.material-symbols-outlined {
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24
}

body {
  min-height: max(884px, 100dvh);
}

</style>
</head>

<body class="font-display">

<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark">

<!-- HEADER -->

<header class="flex items-center p-4 pb-2 justify-between sticky top-0 z-10 bg-background-light dark:bg-background-dark/80 backdrop-blur-sm">

  <div class="flex size-12 shrink-0 items-center justify-start">
    <button
      onclick="window.location.reload()"
      class="flex size-12 cursor-pointer items-center justify-center rounded-full text-gray-900 dark:text-white hover:bg-gray-500/10 transition-colors">

      <span class="material-symbols-outlined">
        refresh
      </span>

    </button>
  </div>

  <h1 class="text-gray-900 dark:text-white text-lg font-bold flex-1 text-center px-2">

    Multi-Prime RSA Clear Ring

  </h1>

  <div class="flex size-12 shrink-0 items-center justify-end"></div>

</header>

<!-- MAIN -->

<main class="flex flex-col gap-6 p-4 flex-1">

  <!-- PLAINTEXT -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Teks Asli
    </label>

    <textarea
      id="input-text"
      placeholder="Masukkan plaintext..."
      class="form-input w-full resize-none rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 min-h-40 p-4 text-base"></textarea>

  </div>

  <!-- PUBLIC KEY -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Kunci Publik (n, e)
    </label>

    <input
      id="public-key"
      placeholder="Contoh: (3233, 17)"
      class="form-input w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 px-4 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50"/>

  </div>

  <!-- ENCRYPT BUTTON -->

  <div class="py-2">

    <button
      id="encrypt-btn"
      class="flex w-full items-center justify-center gap-2 rounded-xl h-14 px-5 bg-primary text-white font-bold hover:bg-primary/90 transition-colors">

      <span class="material-symbols-outlined">
        lock
      </span>

      <span>
        Enkripsi
      </span>

    </button>

  </div>

  <!-- CIPHERTEXT -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Ciphertext
    </label>

    <textarea
      id="ciphertext"
      readonly
      placeholder="Hasil ciphertext..."
      class="form-input w-full resize-none rounded-xl text-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-900/50 min-h-40 p-4 text-base"></textarea>

  </div>

  <!-- PRIVATE KEY -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Kunci Pribadi (n, d)
    </label>

    <input
      id="private-key"
      placeholder="Contoh: (3233, 2753)"
      class="form-input w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800/50 h-14 px-4 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50"/>

  </div>

  <!-- DECRYPT BUTTON -->

  <div class="py-2">

    <button
      id="decrypt-btn"
      class="flex w-full items-center justify-center gap-2 rounded-xl h-14 px-5 bg-green-600 text-white font-bold hover:bg-green-700 transition-colors">

      <span class="material-symbols-outlined">
        lock_open
      </span>

      <span>
        Dekripsi
      </span>

    </button>

  </div>

  <!-- DECRYPT RESULT -->

  <div class="flex flex-col gap-2">

    <label class="text-gray-800 dark:text-gray-100 text-base font-medium">
      Hasil Dekripsi
    </label>

    <textarea
      id="decrypt-result"
      readonly
      placeholder="Hasil dekripsi..."
      class="form-input w-full resize-none rounded-xl text-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-900/50 min-h-40 p-4 text-base"></textarea>

  </div>

</main>
</div>

<script>

// --------------------------------------------------
// FUNGSI BANTU
// --------------------------------------------------

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function modPow(base, exp, mod) {

  let result = 1n;

  let b = BigInt(base);
  let e = BigInt(exp);
  let m = BigInt(mod);

  while (e > 0n) {

    if (e % 2n === 1n) {
      result = (result * b) % m;
    }

    b = (b * b) % m;
    e /= 2n;
  }

  return Number(result);
}

function toHex(x) {
  return x.toString(16).padStart(4, "0").toUpperCase();
}

function fromHexString(hexStr) {

  const res = [];

  for (let i = 0; i < hexStr.length; i += 4) {

    res.push(
      parseInt(hexStr.slice(i, i + 4), 16)
    );
  }

  return res;
}

// --------------------------------------------------
// ENKRIPSI
// --------------------------------------------------

document.getElementById("encrypt-btn").addEventListener("click", () => {

  const plaintext =
    document.getElementById("input-text").value;

  const keyInput =
    document.getElementById("public-key").value.trim();

  const output =
    document.getElementById("ciphertext");

  if (!plaintext || !keyInput) {

    output.value =
      "Mohon isi plaintext dan kunci publik.";

    return;
  }

  // --------------------------------------------
  // Parsing public key
  // --------------------------------------------

  const match =
    keyInput.match(/\((\d+),\s*(\d+)\)/);

  if (!match) {

    output.value =
      "Format kunci publik salah.";

    return;
  }

  const n =
    parseInt(match[1]);

  const e =
    parseInt(match[2]);

  // --------------------------------------------
  // ASCII
  // --------------------------------------------

  const asciiVals =
    Array.from(plaintext).map(ch => ch.charCodeAt(0));

  // --------------------------------------------
  // Unit dan Unit Regular
  // --------------------------------------------

  const Z =
    Array.from({length: 256}, (_, i) => i);

  const units =
    Z.filter(a => gcd(a, 256) === 1);

  function isUnitRegular(a) {

    return units.some(
      u => (a * u * a) % 256 === a
    );
  }

  const unitRegulars =
    Z.filter(isUnitRegular);

  // --------------------------------------------
  // Split m = u + r
  // --------------------------------------------

  let u_list = [];
  let r_list = [];

  for (let m of asciiVals) {

    let found = false;

    for (let u of units) {

      for (let r of unitRegulars) {

        if ((u + r) % 256 === m) {

          u_list.push(u);
          r_list.push(r);

          found = true;
          break;
        }
      }

      if (found) break;
    }

    if (!found) {

      u_list.push((m + 1) % 256);
      r_list.push((m - 1 + 256) % 256);

    }
  }

  // --------------------------------------------
  // RSA Encryption
  // --------------------------------------------

  const Cu =
    u_list.map(u => modPow(u, e, n));

  const Cr =
    r_list.map(r => modPow(r, e, n));

  const C = [];

  for (let i = 0; i < Cu.length; i++) {

    C.push(Cu[i]);
    C.push(Cr[i]);

  }

  // --------------------------------------------
  // Permutasi Bijektif
  // --------------------------------------------

  let a = 5;

  const length = C.length;

  if (gcd(a, length) !== 1) {
    a = 3;
  }

  const perm =
    Array.from({length}, (_, i) => (a * i) % length);

  const C_perm =
    perm.map(i => C[i]);

  // --------------------------------------------
  // Convert ke Hex
  // --------------------------------------------

  const cipherHex =
    C_perm.map(toHex).join("");

  output.value = cipherHex;

});

</script>
</body>
</html>
